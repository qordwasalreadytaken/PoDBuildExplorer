$(document).ready(function() {
    console.log("(document).ready worked");

    // Extract character name from URL if available
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    let characterName = getQueryParam("charName");

    if (characterName) {
        console.log("Character Name from URL:", characterName);
        
        // Fetch character data and process it
        try {
            fetchCharacterData(characterName);
        } catch (error) {
            console.error("Error during API calls:", error);
        }
    } else {
        console.warn("Character Name is not set in the URL.");
        document.getElementById("alertBanner").style.display = "block";
    }

    // Scroll event listeners
    $(window).scroll(function() {
        const scroll = $(window).scrollTop();
        $('.arrow').toggleClass('fade', scroll >= 1);
    });

    $('#main').scroll(function() {
        const scroll = $('#main').scrollTop();
        $('.arrow').toggleClass('fade', scroll >= 1);
    });


document.addEventListener("DOMContentLoaded", function() {
    initializeCharacterSections();
});

function initializeCharacterSections() {
    const characterSections = document.querySelectorAll(".character-section");

    characterSections.forEach(section => {
        const characterName = section.getAttribute("data-character-name");
        console.log("Initializing character:", characterName);

        if (characterName) {
            fetchCharacterData(characterName);
        } else {
            console.warn("Character Name is not set in the configuration for a section.");
            section.querySelector("#alertBanner").style.display = "block";
        }
    });
}

function showAlert(message) {
    const banner = document.getElementById("alertBanner");
    if (!banner) {
        return;
    }

    banner.textContent = message;
    banner.style.display = "block";
}

function normalizeCharacterName(value) {
    return String(value || "").trim().toLowerCase();
}

function ladderSnapshotPath() {
    const mode = (getQueryParam("mode") || "sc").toLowerCase();
    return mode === "hc" ? "../hc_ladder.json" : "../sc_ladder.json";
}

async function fetchCharacterData(characterName) {
    const snapshotPath = ladderSnapshotPath();
    const modeLabel = snapshotPath.includes("hc_") ? "hardcore" : "softcore";

    try {
        const response = await fetch(snapshotPath, { cache: "force-cache" });
        if (!response.ok) {
            throw new Error(`Snapshot load failed with status: ${response.status}`);
        }

        const ladderCharacters = await response.json();
        const match = Array.isArray(ladderCharacters)
            ? ladderCharacters.find(character => normalizeCharacterName(character["Name"]) === normalizeCharacterName(characterName))
            : null;

        if (!match) {
            throw new Error(`Character ${characterName} was not found in the ${modeLabel} ladder snapshot.`);
        }

        document.getElementById("alertBanner").style.display = "none";
        processCharacterData(match);
    } catch (error) {
        console.error("Error fetching character data:", error);
        showAlert(`No ${modeLabel} ladder snapshot was found for ${characterName}.`);
    }
}

function findWornItems(equippedItems) {
    var result = {};
    equippedItems.forEach((item) => {
      if(item["Worn"] !== "") {
        result[item["Worn"]] = item;
      }
    })
    return result;
}
  
function createItemHTML(itemObject) {
    let itemStr = "";

    // Title with special handling for "Delerium"
    if (itemObject["Title"] === "2693") {
        itemStr += `<div class='item-title title-${itemObject["QualityCode"]}'>Delerium</div>`;
    } else {
        itemStr += `<div class='item-title title-${itemObject["QualityCode"]}'>${itemObject["Title"]}</div>`;
    }

    // Quality tag
    if (itemObject["QualityCode"] !== "q_normal") {
        itemStr += `<div class='item-tag tag-${itemObject["QualityCode"]}'>${itemObject["Tag"]}</div>`;
    }

    // Rune tag, if applicable
    if ("RuneTag" in itemObject && itemObject["QualityCode"] === "q_runeword") {
        itemStr += `<div class='item-runetag title-q_runeword'>${itemObject["RuneTag"]}</div>`;
    }

    // Defense and block (only show what's present)
    let defenseBlock = [];
    if ("Defense" in itemObject) {
        defenseBlock.push(`Defense: ${itemObject["Defense"]}`);
    }
    if ("Block" in itemObject) {
        defenseBlock.push(`Chance to Block: ${itemObject["Block"]}`);
    }
    if (defenseBlock.length > 0) {
        itemStr += `<div class='item-defense-block'>${defenseBlock.join(" | ")}</div>`;
    }

    // Weapon damage
    let minmaxDamage = [];
    if ("DamageMinimum" in itemObject) {
        minmaxDamage.push(`Damage: ${itemObject["DamageMinimum"]} - ${itemObject["DamageMaximum"]}`);
    }
    if (minmaxDamage.length > 0) {
        itemStr += `<div class='item-damage'>${minmaxDamage.join(" | ")}</div>`;
    }

        // Item level and durability
    let levelDurability = [];
    if ("ItemLevel" in itemObject) {
        levelDurability.push(`Item Level: ${itemObject["ItemLevel"]}`);
    }
    if ("Durability" in itemObject) {
        levelDurability.push(`Durability: ${itemObject["Durability"]}/${itemObject["DurabilityMaximum"]}`);
    }
    if (levelDurability.length > 0) {
        itemStr += `<div class='item-level-durability'>${levelDurability.join(" | ")}</div>`;
    }

    // Property list (handling "Corrupted" specifically)
    itemObject["PropertyList"].forEach(property => {
        if (/corrupted/i.test(property)) {
            itemStr += `<div class='item-corrupted'>Corrupted</div>`;
        } else {
            // ✅ Remove "-Up" if the property ends with "when you Level-Up"
            const cleanedProperty = property.replace(/(when you Level)-Up$/, "$1");
            itemStr += `<div class='item-property'>${cleanedProperty}</div>`;
        }
    });


    // ✅ Display socketed items if present and not a runeword
    if (
        itemObject["QualityCode"] !== "q_runeword" &&
        itemObject["Sockets"] &&
        typeof itemObject["Sockets"] === "object"
    ) {
        const socketNameCounts = {};

        Object.values(itemObject["Sockets"]).forEach(socketedItem => {
            if (socketedItem?.Title) {
                // ✅ Label Rare Jewels properly
                let displayName = socketedItem.Title;
                if (socketedItem.Quality === "Rare" && /jewel/i.test(socketedItem.Tag || "")) {
                    displayName = `Misc. Rare Jewel`;
                }
                if (socketedItem.Quality === "Magic" && /jewel/i.test(socketedItem.Tag || "")) {
                    displayName = `Misc. Magic Jewel`;
                }

                socketNameCounts[displayName] = (socketNameCounts[displayName] || 0) + 1;
            }
        });

        const socketedSummary = Object.entries(socketNameCounts)
            .map(([name, count]) => (count > 1 ? `${name} x${count}` : name))
            .join("<br> ");

        if (socketedSummary) {
            itemStr += `<div class='item-sockets'><strong>Socketed With:</strong><br> ${socketedSummary}</div>`;
        }
    }



    console.log("Tooltip content for item:", itemStr);
    return itemStr;
}

function renderCharms(inventoryItems) {
    // Clear any existing charms from all predefined slots
    for (let y = 0; y < 4; y++) {
        for (let x = 0; x < 10; x++) {
            $(`#charm-${x}-${y}`).empty().removeClass('charm-occupied');
        }
    }
    
    // Filter for charms only in the bottom 4 rows (y >= 5, which are rows 5,6,7,8)
    const charms = inventoryItems.filter(item => {
        const isCharm = item["TextTag"] && item["TextTag"].toLowerCase().includes("charm");
        const position = item["Position"];
        const inBottomRows = position && position.y >= 5 && position.y <= 8;
        return isCharm && inBottomRows;
    });
    
    console.log("Found charms in bottom 4 rows:", charms.length);
    
    // Place charms in their slots
    charms.forEach((charm, index) => {
        const position = charm["Position"];
        const size = charm["Size"];
        
        if (!position || !size) {
            console.warn("Charm missing position or size data:", charm);
            return;
        }
        
        // Adjust y position to be relative to the charm inventory (row 5 becomes 0)
        const gridX = position.x;
        const gridY = position.y - 5;
        
        // Find the slot for this charm
        const slotId = `charm-${gridX}-${gridY}`;
        const slot = $(`#${slotId}`);
        
        if (slot.length === 0) {
            console.warn("Slot not found for charm:", slotId);
            return;
        }
        
        // Create charm content (image + tooltip)
        const charmContent = createCharmContent(charm, index, size);
        slot.append(charmContent);
        
        // If charm spans multiple cells, mark those cells as occupied
        if (size.invwidth > 1 || size.invheight > 1) {
            for (let dy = 0; dy < size.invheight; dy++) {
                for (let dx = 0; dx < size.invwidth; dx++) {
                    if (dx === 0 && dy === 0) continue; // Skip the main cell
                    const occupiedSlotId = `charm-${gridX + dx}-${gridY + dy}`;
                    $(`#${occupiedSlotId}`).addClass('charm-occupied');
                }
            }
        }
    });
}

function createCharmContent(charmObject, index, size) {
    // Determine charm image based on Tag field
    let charmImage = "";
    const tag = charmObject["Tag"].toLowerCase();
    const title = charmObject["Title"] ? charmObject["Title"].toLowerCase() : "";
    
    // Check for unique charms first
    if (tag === "large charm" && title.includes("hellfire torch")) {
        charmImage = "torch.png";
    } else if (tag === "small charm" && title.includes("annihilus")) {
        charmImage = "anni.png";
    } else if (tag === "small charm") {
        charmImage = "charms.png";
    } else if (tag === "large charm") {
        charmImage = "charml.png";
    } else if (tag === "grand charm") {
        charmImage = "charmg.png";
    } else {
        charmImage = "charms.png";
    }
    
    const imageUrl = `./img/${charmImage}`;
    
    // Calculate exact pixel size for multi-cell charms (95% of cell size)
    const cellWidth = 59;
    const cellHeight = 58;
    const width = size.invwidth * cellWidth * 0.95;
    const height = size.invheight * cellHeight * 0.95;
    
    // Generate tooltip content
    const tooltipContent = createItemHTML(charmObject);
    const propertySize = charmObject["PropertyList"].length;
    const maxCharWidth = Math.max.apply(Math, charmObject["PropertyList"].map(x => x.length));
    const tooltipClass = propertySize > 10 || maxCharWidth > 40 ? "itemhover-box itemhover-box-small" : "itemhover-box";
    
    return `
        <div class="charm-hover-wrapper" style="
            width: ${width}px;
            height: ${height}px;
            position: absolute;
            top: 0;
            left: 0;
        ">
            <img src="${imageUrl}" style="
                width: 100%;
                height: 100%;
                display: block;
                pointer-events: none;
            " />
            <div class="${tooltipClass}">
                ${tooltipContent}
            </div>
        </div>
    `;
}

// Setup weapon swap click handlers
function setupWeaponSwapHandlers() {
    // Add click handler for weapon1 slot
    $("#hover-container-weapon1").off('click').on('click', function(e) {
        e.stopPropagation();
        toggleWeaponSwap();
    });
    
    // Add click handler for weapon2 slot
    $("#hover-container-weapon2").off('click').on('click', function(e) {
        e.stopPropagation();
        toggleWeaponSwap();
    });
}

// Toggle between primary and swap weapons (both weapons swap together)
function toggleWeaponSwap() {
    console.log("Toggling weapon swap");
    
    // Check if swap weapons exist
    if (!window.weaponData.sweapon1 && !window.weaponData.sweapon2) {
        console.log("No swap weapons available");
        return;
    }
    
    // Toggle the swap state for both weapons
    window.weaponSwapState = !window.weaponSwapState;
    const isSwapped = window.weaponSwapState;
    
    // Update weapon1
    const $container1 = $("#hover-container-weapon1");
    $container1.empty();
    const weaponToDisplay1 = isSwapped ? window.weaponData.sweapon1 : window.weaponData.weapon1;
    if (weaponToDisplay1) {
        $container1.append(createImageHTML(weaponToDisplay1, "hover-container-weapon1"));
        if (isSwapped) {
            $container1.addClass('swapped');
        } else {
            $container1.removeClass('swapped');
        }
    }
    
    // Update weapon2
    const $container2 = $("#hover-container-weapon2");
    $container2.empty();
    const weaponToDisplay2 = isSwapped ? window.weaponData.sweapon2 : window.weaponData.weapon2;
    if (weaponToDisplay2) {
        $container2.append(createImageHTML(weaponToDisplay2, "hover-container-weapon2"));
        if (isSwapped) {
            $container2.addClass('swapped');
        } else {
            $container2.removeClass('swapped');
        }
    }
    
    console.log("Swapped to " + (isSwapped ? "swap" : "primary") + " weapons");
}
